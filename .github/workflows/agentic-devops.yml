name: Agentic DevOps POC

on:
  workflow_dispatch:
    inputs:
      risk_profile:
        description: Release evidence profile to generate
        type: choice
        required: true
        default: low
        options:
          - low
          - high
      deploy_production:
        description: Request production deployment after staging
        type: boolean
        required: true
        default: true
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build_test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -q

      - name: Create release evidence
        env:
          RISK_PROFILE: ${{ github.event.inputs.risk_profile || 'low' }}
        run: |
          python scripts/create_release_evidence.py `
            --risk-profile "$RISK_PROFILE" `
            --commit-sha "${{ github.sha }}" `
            --workflow-run "${{ github.run_id }}" `
            --out evidence/release-evidence.json
        shell: pwsh

      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence
          path: evidence/release-evidence.json

  agent_review:
    name: Agentic Release Review
    runs-on: ubuntu-latest
    needs: build_test
    outputs:
      decision: ${{ steps.review.outputs.decision }}
      risk_level: ${{ steps.review.outputs.risk_level }}
      risk_score: ${{ steps.review.outputs.risk_score }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Download release evidence
        uses: actions/download-artifact@v4
        with:
          name: release-evidence
          path: release-evidence

      - name: Generate agentic review
        id: review
        run: |
          python scripts/agentic_release_review.py `
            --evidence release-evidence/release-evidence.json `
            --out release-review/release-review.md
        shell: pwsh

      - name: Add review to workflow summary
        run: Get-Content release-review/release-review.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
        shell: pwsh

      - name: Upload agentic review
        uses: actions/upload-artifact@v4
        with:
          name: agentic-release-review
          path: release-review/release-review.md

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: agent_review
    if: needs.agent_review.outputs.decision == 'proceed'
    environment:
      name: staging
      url: https://example.com/agentic-devops-poc/staging

    steps:
      - name: Simulate staging deployment
        run: |
          echo "Deploying approved release candidate to staging."
          echo "Risk level: ${{ needs.agent_review.outputs.risk_level }}"
          echo "Risk score: ${{ needs.agent_review.outputs.risk_score }}"

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs:
      - agent_review
      - deploy_staging
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_production == 'true' && needs.agent_review.outputs.decision == 'proceed'
    environment:
      name: production
      url: https://example.com/agentic-devops-poc/production

    steps:
      - name: Simulate production deployment
        run: |
          echo "Production deployment approved by a human reviewer."
          echo "The agent recommended proceed, but the environment gate controlled release authority."
